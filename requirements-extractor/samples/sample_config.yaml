# ===========================================================================
# Requirements Extractor — sample config
# ===========================================================================
#
# Save this file anywhere and point the tool at it to tune how the parser
# reads your documents.  Every section is optional; anything you leave out
# keeps the built-in default.
#
# Two ways to use it:
#
#   1. Per-run (whole batch):
#        CLI:  python extract.py spec.docx -o out.xlsx --config sample_config.yaml
#        GUI:  use the "Config file" field.
#
#   2. Per-doc (auto-loaded):
#        Place a file named "<docname>.reqx.yaml" next to a .docx — e.g.
#          specs/payload.docx
#          specs/payload.reqx.yaml   <- auto-loaded when payload.docx runs
#        Any keys here OVERRIDE the per-run config for that single file.
#
# Merge rule of thumb: mappings merge key-by-key, but lists and scalars
# replace wholesale.  So a per-doc "skip_sections.titles: [Glossary]"
# replaces the per-run list — it does not append to it.
# ===========================================================================

version: 1


# ---------------------------------------------------------------------------
# Sections / tables to ignore entirely.
# ---------------------------------------------------------------------------
skip_sections:
  # Auto-skip common boilerplate sections (Glossary, Acronyms, References,
  # Revision History, Document Control, Table of Contents, Approvals,
  # Distribution List, etc.) without listing each one in `titles`.
  # The full default list lives in `requirements_extractor.config
  # .DEFAULT_BOILERPLATE_TITLES`.  Both the section-row title path
  # (column-1 of a 2-col table) and the heading-scope path (a top-level
  # Heading 1/2/3 paragraph) honour this — a Heading "Glossary" drops
  # everything until the next non-boilerplate heading at the same level
  # or shallower.  Set to false if your corpus genuinely uses one of
  # the default names for a substantive section.
  auto_boilerplate: true

  # Case-insensitive match against the first-column text of each row,
  # OR the text of a top-level Heading paragraph.
  # A row is skipped if any of these strings equals it, is contained in
  # it, or matches it as a prefix (so "3. Revision History" skips when
  # "Revision History" is in the list).  Layered on top of
  # `auto_boilerplate` — use this for project-specific phrases the
  # default list doesn't cover.
  titles: []

  # 1-based indices of top-level tables to skip outright.  Handy for the
  # metadata/summary block that some templates put as Table 1.
  table_indices: []


# ---------------------------------------------------------------------------
# Table geometry — where the actor lives, where the content lives, and
# how to recognise a section-header row.
# ---------------------------------------------------------------------------
tables:
  # 1-based column indices within a row.
  actor_column:   1
  content_column: 2

  # A requirements table is any table whose column count falls in
  # [min_columns, max_columns].  Set max_columns to -1 for "no upper cap".
  min_columns: 2
  max_columns: 2

  # Regex applied to the actor-column text.  If it matches, the row is
  # treated as a section header (emits a SectionRowEvent) instead of an
  # actor row.  The default below accepts numeric ("3", "3.1", "3.1.2")
  # AND alphanumeric schemes ("A.1", "SR-1.2", "REQ-042", "5.1.1a").
  section_prefix: '^\s*(?:[A-Z]{1,4}[-.]?)?\d+(?:\.\d+)*[.)]?\s+\S'


# ---------------------------------------------------------------------------
# Keyword tuning.  Add your house terms, drop ones that cause false
# positives in your docs.  All entries are case-insensitive.
# ---------------------------------------------------------------------------
keywords:
  # Extra binding keywords.  Multi-word phrases are fine.
  hard_add:
    - is responsible for
    - shall not
  # Drop built-in hard keywords that your prose uses in non-requirement
  # contexts.  'will' is a common culprit ("We will see..." is future
  # tense, not a requirement).
  hard_remove:
    - will

  soft_add: []
  soft_remove: []


# ---------------------------------------------------------------------------
# Content filters — drop sentences/bullets that look like requirements but
# aren't.  Applied AFTER sentence splitting but BEFORE keyword matching.
# ---------------------------------------------------------------------------
content:
  # Drop any sentence/bullet whose leading text matches (case-insensitive).
  skip_if_starts_with:
    - "Note:"
    - "Example:"
    - "See also:"
    - "Caution:"
    - "Informative:"

  # Optional regex applied to every candidate sentence.  If it matches
  # anywhere in the sentence, the sentence is dropped.
  # Example: drop anything that looks like "TBD" or a tracked-change note.
  skip_pattern: null
  # skip_pattern: '(?:\bTBD\b|\[tracked change\])'

  # When true, any candidate sentence without a primary actor is dropped.
  # Useful for very noisy preamble prose that sometimes trips keywords.
  require_primary_actor: false


# ---------------------------------------------------------------------------
# Parser behaviour.
# ---------------------------------------------------------------------------
parser:
  # When true, the parser walks nested tables to arbitrary depth.  Block
  # refs in the output become dotted paths like
  # "Nested Table 1 R2C1 > Nested Table 1 R1C2 > Paragraph 3" so you can
  # still trace back to the exact source.
  # Set to false to restore the legacy one-level-of-nesting behaviour.
  recursive: true
